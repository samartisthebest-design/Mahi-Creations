<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grandma's Creations</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://checkout.razorpay.com/v1/checkout.js"></script>
</head>
<body class="bg-pink-50 text-gray-800">

<!-- Navbar -->
<nav class="bg-pink-300 p-4 flex justify-between items-center shadow-md">
  <h1 class="font-bold text-xl">🌸 Grandma's Creations</h1>
  <button onclick="toggleCart()" class="bg-white px-3 py-1 rounded-lg shadow">
    Cart (<span id="cart-count">0</span>)
  </button>
</nav>

<!-- Add Product Panel -->
<div class="p-4 bg-white shadow-md m-4 rounded-xl">
  <h2 class="font-bold mb-2">➕ Add New Product</h2>
  <input id="pname" placeholder="Product Name" class="border p-2 w-full mb-2 rounded">
  <input id="pprice" type="number" placeholder="Price" class="border p-2 w-full mb-2 rounded">
  <input id="pimg" placeholder="Image URL" class="border p-2 w-full mb-2 rounded">
  <input id="pdesc" placeholder="Description" class="border p-2 w-full mb-2 rounded">
  <button onclick="addProduct()" class="bg-blue-400 text-white px-4 py-2 rounded-lg">Add Product</button>
</div>

<!-- Products -->
<section class="p-6 grid md:grid-cols-3 gap-6" id="products"></section>

<!-- Cart -->
<div id="cart" class="fixed right-0 top-0 w-80 h-full bg-white p-4 hidden shadow-lg overflow-y-auto">
  <h2 class="font-bold text-lg">🛒 Cart</h2>
  <div id="cart-items"></div>
  <p class="mt-2 font-bold">Total: ₹<span id="total">0</span></p>

  <h3 class="mt-4 font-semibold">Customer Details</h3>
  <input id="name" placeholder="Name" class="w-full border p-2 mt-1 rounded">
  <input id="address" placeholder="Address" class="w-full border p-2 mt-1 rounded">

  <button onclick="checkout()" class="mt-3 bg-green-400 hover:bg-green-500 text-white w-full py-2 rounded-lg transition">Pay</button>
  <button onclick="whatsappOrder()" class="mt-2 bg-green-600 hover:bg-green-700 text-white w-full py-2 rounded-lg transition">Order on WhatsApp</button>
  <button onclick="clearCart()" class="mt-2 bg-red-400 hover:bg-red-500 text-white w-full py-2 rounded-lg transition">Clear Cart</button>
</div>

<script>
let products = JSON.parse(localStorage.getItem('products')) || [
  {
    name:"Crochet Flowers",
    price:150,
    img:"https://via.placeholder.com/300",
    desc:"Handmade crochet flowers 🌸"
  }
];

let cart = JSON.parse(localStorage.getItem('cart')) || [];

function saveProducts(){
  localStorage.setItem('products', JSON.stringify(products));
}

function addProduct(){
  let name = document.getElementById('pname').value.trim();
  let price = parseFloat(document.getElementById('pprice').value);
  let img = document.getElementById('pimg').value.trim();
  let desc = document.getElementById('pdesc').value.trim();

  // allow empty image (use default)
  if(!img){
    img = "https://via.placeholder.com/300";
  }

  // fix: allow price properly and validate
  if(!name || isNaN(price)){
    alert("Enter valid name and price!");
    return;
  }

  products.push({name, price, img, desc});
  saveProducts();
  renderProducts();

  // clear inputs
  document.getElementById('pname').value='';
  document.getElementById('pprice').value='';
  document.getElementById('pimg').value='';
  document.getElementById('pdesc').value='';
}

  products.push({name, price: Number(price), img, desc});
  saveProducts();
  renderProducts();

  document.getElementById('pname').value='';
  document.getElementById('pprice').value='';
  document.getElementById('pimg').value='';
  document.getElementById('pdesc').value='';
}

function renderProducts(){
  let container = document.getElementById('products');
  container.innerHTML='';
  products.forEach((p,i)=>{
    container.innerHTML += `
    <div class='bg-white p-4 rounded-2xl shadow-md hover:shadow-xl transition'>
      <img src='${p.img}' class="rounded-xl mb-2">
      <h3 class="font-semibold text-lg">${p.name}</h3>
      <p class="text-sm text-gray-500">${p.desc || ''}</p>
      <p class="font-bold mt-1">₹${p.price}</p>
      <button onclick="addToCart(${i})" class='bg-pink-400 hover:bg-pink-500 text-white px-3 py-1 mt-2 rounded-lg transition'>Add to Cart</button>
    </div>`;
  });
}

function addToCart(i){
  let item = products[i];
  let existing = cart.find(c=>c.name===item.name);
  if(existing) existing.qty++;
  else cart.push({...item, qty:1});
  saveCart();
}

function saveCart(){
  localStorage.setItem('cart', JSON.stringify(cart));
  updateCart();
}

function updateCart(){
  let el = document.getElementById('cart-items');
  el.innerHTML='';
  let total=0;

  cart.forEach((item,i)=>{
    total += item.price*item.qty;
    el.innerHTML += `
    <div class='flex justify-between items-center border-b py-2'>
      <div>
        ${item.name} (₹${item.price})
        <div>
          <button onclick="changeQty(${i},-1)">-</button>
          ${item.qty}
          <button onclick="changeQty(${i},1)">+</button>
        </div>
      </div>
      <button onclick="removeItem(${i})">❌</button>
    </div>`;
  });

  document.getElementById('total').innerText=total;
  let count = cart.reduce((sum, item) => sum + item.qty, 0);
  document.getElementById('cart-count').innerText=count;
}

function changeQty(i,val){
  cart[i].qty += val;
  if(cart[i].qty<=0) cart.splice(i,1);
  saveCart();
}

function removeItem(i){
  cart.splice(i,1);
  saveCart();
}

function clearCart(){
  cart = [];
  saveCart();
}

function toggleCart(){
  document.getElementById('cart').classList.toggle('hidden');
}

function checkout(){
  let total = cart.reduce((s,i)=>s+i.price*i.qty,0);

  let rzp = new Razorpay({
    key:"YOUR_RAZORPAY_KEY",
    amount: total*100,
    currency:"INR",
    name:"Grandma's Creations",
    handler: function(){
      alert("Order placed!");
      cart=[]; saveCart();
    }
  });

  rzp.open();
}

function whatsappOrder(){
  let text = "Order:%0A";
  cart.forEach(i=>{
    text += `${i.name} x${i.qty} = ₹${i.price*i.qty}%0A`;
  });
  text += `Total: ₹${document.getElementById('total').innerText}`;

  window.open(`https://wa.me/YOURNUMBER?text=${text}`);
}

renderProducts();
updateCart();
</script>

</body>
</html>
